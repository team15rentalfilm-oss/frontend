<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${entity.displayName + ' - Film Rental Store'}">Entity</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0f1115;
            color: #f3f4f6;
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px 18px 36px;
        }

        .back-link {
            color: #b6bcc8;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .header {
            margin: 16px 0 20px;
        }

        .header h1 {
            margin: 0 0 6px;
            font-size: 2rem;
            font-weight: 600;
        }

        .header p {
            margin: 0;
            color: #9ca3af;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 18px;
        }

        .panel {
            background: #171a21;
            border: 1px solid #22262e;
            border-radius: 14px;
            padding: 16px;
            min-width: 0;
            overflow: hidden;
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 1rem;
            font-weight: 600;
        }

        .endpoint-list {
            display: grid;
            gap: 10px;
        }

        .endpoint-card {
            padding: 12px;
            border: 1px solid #22262e;
            border-radius: 10px;
            background: #171a21;
            cursor: pointer;
        }

        .endpoint-card.active {
            border-color: #f3f4f6;
        }

        .endpoint-method {
            display: inline-block;
            margin-bottom: 8px;
            font-size: 0.76rem;
            font-weight: 600;
            color: #b6bcc8;
        }

        .endpoint-card p {
            margin: 0;
            font-size: 0.9rem;
            color: #d1d5db;
            word-break: break-word;
        }

        .endpoint-title {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #f3f4f6;
        }

        .endpoint-subtitle {
            font-size: 0.84rem;
            color: #9ca3af;
            word-break: break-word;
        }

        .content {
            display: grid;
            gap: 18px;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(180px, 100%), 1fr));
            gap: 12px;
            min-width: 0;
        }

        .field-group {
            display: grid;
            gap: 8px;
        }

        .field-section {
            margin-top: 14px;
        }

        .field-section h3 {
            margin: 0 0 10px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        label {
            display: grid;
            gap: 6px;
            min-width: 0;
            font-size: 0.9rem;
            color: #d1d5db;
        }

        input,
        select {
            width: 100%;
            max-width: 100%;
            padding: 10px 12px;
            border: 1px solid #2c313b;
            border-radius: 10px;
            background: #11141a;
            font: inherit;
            color: #f3f4f6;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            padding: 10px 16px;
            border: 1px solid #2c313b;
            border-radius: 10px;
            background: #11141a;
            font: inherit;
            color: #f3f4f6;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        button.primary {
            background: #f3f4f6;
            border-color: #f3f4f6;
            color: #0f1115;
        }

        .helper {
            margin: 10px 0 0;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            background: #20252d;
            color: #c4cad4;
        }

        .status.ok {
            background: #edf7f0;
            color: #1c6b37;
        }

        .status.error {
            background: #fdeeee;
            color: #9d2b2b;
        }

        .response-box {
            min-height: 120px;
        }

        .response-empty {
            color: #9ca3af;
            font-size: 0.95rem;
        }

        .response-stack {
            display: grid;
            gap: 14px;
        }

        .response-note,
        .response-summary {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #22262e;
            background: #11141a;
        }

        .response-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .response-pill {
            padding: 6px 10px;
            border-radius: 999px;
            background: #20252d;
            color: #d1d5db;
            font-size: 0.85rem;
        }

        .pagination-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .pager {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border: 1px solid #2c313b;
            border-radius: 10px;
            background: #11141a;
            color: #f3f4f6;
            text-decoration: none;
        }

        .pager.disabled {
            opacity: 0.45;
            pointer-events: none;
        }

        .message-card {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #22262e;
            background: #11141a;
        }

        .message-card strong {
            display: block;
            margin-bottom: 6px;
            color: #f3f4f6;
        }

        .message-card p {
            margin: 0;
            color: #c4cad4;
            line-height: 1.5;
        }

        .nested-list {
            display: grid;
            gap: 10px;
        }

        .nested-item {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #22262e;
            background: #11141a;
        }

        .nested-item strong {
            display: block;
            margin-bottom: 6px;
            color: #e5e7eb;
            font-size: 0.86rem;
        }

        .chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 6px 10px;
            border-radius: 999px;
            background: #20252d;
            color: #d1d5db;
            font-size: 0.85rem;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }

        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #ececec;
            text-align: left;
            vertical-align: top;
        }

        th {
            color: #e5e7eb;
            font-weight: 600;
            background: #11141a;
        }

        td {
            color: #c4cad4;
            word-break: break-word;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .detail-card {
            border: 1px solid #22262e;
            border-radius: 10px;
            padding: 12px;
            background: #11141a;
        }

        .detail-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #e5e7eb;
        }

        .detail-card span {
            color: #c4cad4;
            word-break: break-word;
        }

        .record-grid {
            display: grid;
            gap: 14px;
        }

        .record-card {
            border: 1px solid #22262e;
            border-radius: 12px;
            padding: 14px;
            background: #11141a;
        }

        .record-header {
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
        }

        .record-title {
            display: block;
            font-size: 1rem;
            color: #f3f4f6;
        }

        .record-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        @media (max-width: 920px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .button-row {
                flex-direction: column;
            }

            .response-summary {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <a class="back-link" th:href="@{/member/{name}(name=${member.key})}">&larr; Back</a>

    <section class="header">
        <h1 th:text="${entity.displayName}">Entity</h1>
        <p th:text="${entity.description}">Description</p>
        <p class="helper" th:if="${!#lists.isEmpty(entity.allowedSortFields)}"
           th:text="${'You can sort this list by: ' + entity.allowedSortFields}">
            You can sort this list by
        </p>
    </section>

    <section class="layout">
        <aside class="panel">
            <h2>Actions</h2>
            <div class="endpoint-list" id="endpointList">
                <article class="endpoint-card" th:each="endpoint, iter : ${entity.endpoints}" th:attr="data-index=${iter.index}">
                    <span class="endpoint-method" th:text="${endpoint.method}">GET</span>
                    <strong class="endpoint-title" th:text="${endpoint.label}">Action</strong>
                    <p class="endpoint-subtitle" th:text="${endpoint.path}">/api/example</p>
                </article>
            </div>
        </aside>

        <div class="content">
            <section class="panel">
                <h2>Fill In Details</h2>
                <label>
                    Choose an action
                    <select id="endpointSelect"></select>
                </label>

                <div id="pathSection" class="field-section" hidden>
                    <h3>Main Details</h3>
                    <div id="pathFields" class="field-grid"></div>
                </div>

                <div id="querySection" class="field-section" hidden>
                    <h3>More Options</h3>
                    <div id="queryFields" class="field-grid"></div>
                </div>

                <div id="bodySection" class="field-section" hidden>
                    <h3>Information To Save</h3>
                    <div id="bodyFields" class="field-grid"></div>
                </div>

                <p class="helper" id="endpointHelper"></p>

                <div class="button-row">
                    <button id="sendButton" class="primary" type="button">Run</button>
                    <button id="resetButton" type="button">Clear</button>
                </div>
            </section>

            <section class="panel">
                <h2>Result</h2>
                <span id="statusBadge" class="status">Ready</span>
                <div id="responseOutput" class="response-box" style="margin-top: 14px;">
                    <div class="response-empty">Your result will appear here.</div>
                </div>
            </section>

        </div>
    </section>
</main>

<script th:inline="javascript">
    const entityKey = /*[[${entity.key}]]*/ "";
    const entityDisplayName = /*[[${entity.displayName}]]*/ "Items";
    const endpointConfigs = JSON.parse(/*[[${endpointConfigsJson}]]*/ "[]");
    const endpointSelect = document.getElementById("endpointSelect");
    const endpointCards = Array.from(document.querySelectorAll(".endpoint-card"));
    const endpointHelper = document.getElementById("endpointHelper");
    const responseOutput = document.getElementById("responseOutput");
    const statusBadge = document.getElementById("statusBadge");

    const pathSection = document.getElementById("pathSection");
    const querySection = document.getElementById("querySection");
    const bodySection = document.getElementById("bodySection");
    const pathFields = document.getElementById("pathFields");
    const queryFields = document.getElementById("queryFields");
    const bodyFields = document.getElementById("bodyFields");

    let selectedIndex = 0;
    let lastRequestPayload = null;
    let responsePagination = null;
    const expandedPagingEntities = new Set(["films", "staff", "payments", "rentals"]);
    const strictRequestEntities = new Set(["addresses", "cities", "customers", "films", "stores"]);
    const entityRequestHints = {
        addresses: "Include the city and country details too. For a full update, fill in every field.",
        cities: "Include the country details too. For a full update, fill in every field.",
        customers: "Include the store number and full address details. For a full update, fill in every field.",
        films: "Enter the language name, plus category and actor names separated by commas. For a full update, fill in every field.",
        stores: "Include the manager staff number and full address details. For a full update, fill in every field."
    };

    function singularizeLabel(value) {
        if (!value) {
            return "item";
        }
        if (value.endsWith("ies")) {
            return value.slice(0, -3) + "y";
        }
        if (value.endsWith("s")) {
            return value.slice(0, -1);
        }
        return value;
    }

    function entitySingularLower() {
        return singularizeLabel(entityDisplayName).toLowerCase();
    }

    function entityPluralLower() {
        return entityDisplayName.toLowerCase();
    }

    function buildFriendlyActionTitle(endpoint) {
        const label = (endpoint.label || "").toLowerCase();
        const singular = entitySingularLower();
        const plural = entityPluralLower();

        if (label.startsWith("create")) {
            return `Create a new ${singular}`;
        }
        if (label.startsWith("list")) {
            return `See all ${plural}`;
        }
        if (label.startsWith("get") && label.includes("details")) {
            return `View ${singular} details`;
        }
        if (label.startsWith("get") && label.includes(" by id")) {
            return `View ${singular} by ID`;
        }
        if (label.startsWith("search")) {
            return label.replace(/^search/i, "Find").replace(/^./, (match) => match.toUpperCase());
        }
        if (label.startsWith("filter")) {
            return label.replace(/^filter/i, "Find by").replace(/^./, (match) => match.toUpperCase());
        }
        if (label.startsWith("replace")) {
            return `Replace this ${singular}`;
        }
        if (label.startsWith("patch")) {
            return `Update part of this ${singular}`;
        }
        if (label.startsWith("mark rental returned")) {
            return "Mark a rental as returned";
        }
        return endpoint.label || `${endpoint.method} ${endpoint.path}`;
    }

    function simplifyNotes(endpoint) {
        const notes = endpoint.notes || "";
        if (!notes) {
            return "";
        }

        return notes
            .replace(/Replace \{[^}]+\} with /i, "Enter the ")
            .replace(/an /i, "")
            .replace(/a /i, "")
            .replace(/ id\./i, " ID number.")
            .replace(/Provide /i, "Enter ")
            .replace(/Use any combination of /i, "You can enter any of these: ")
            .replace(/Use /i, "You can use ");
    }

    function buildActionHelperText(endpoint) {
        const parts = [];

        if (isPagedEndpoint(endpoint)) {
            parts.push(`${defaultPageSize(endpoint)} items are shown on each page.`);
        }

        const notes = simplifyNotes(endpoint);
        if (notes) {
            parts.push(notes);
        }

        if (endpoint.bodyFields && endpoint.bodyFields.length && strictRequestEntities.has(entityKey)) {
            parts.push(entityRequestHints[entityKey]);
        }

        return parts.join(" ");
    }

    function shouldOpenResultsInNewTab(endpoint) {
        return endpoint.method === "GET" && buildFriendlyActionTitle(endpoint).startsWith("See all ");
    }

    function isManagedQueryField(fieldName) {
        return fieldName === "page" || fieldName === "size" || fieldName === "sort";
    }

    function isPagedEndpoint(endpoint) {
        return (endpoint.queryFields || []).some((field) => field.name === "page" || field.name === "size");
    }

    function usesExpandedPaging(endpoint = endpointConfigs[selectedIndex]) {
        return expandedPagingEntities.has(entityKey) && isPagedEndpoint(endpoint);
    }

    function defaultPageSize(endpoint) {
        return usesExpandedPaging(endpoint) ? 100 : 12;
    }

    function createInput(field, prefix) {
        const wrapper = document.createElement("label");
        wrapper.textContent = field.optional ? field.label + " (optional)" : field.label;

        let input;
        if (field.type === "boolean") {
            input = document.createElement("select");
            const emptyOption = new Option("Select", "");
            const trueOption = new Option("true", "true");
            const falseOption = new Option("false", "false");
            input.add(emptyOption);
            input.add(trueOption);
            input.add(falseOption);
        } else {
            input = document.createElement("input");
            input.type = field.type === "email" ? "email" : field.type === "number" || field.type === "decimal" ? "number" : "text";
            if (field.type === "decimal") {
                input.step = "0.01";
            }
        }

        input.name = field.name;
        input.dataset.type = field.type;
        input.dataset.optional = String(Boolean(field.optional));
        input.id = prefix + "-" + field.name;
        input.placeholder = field.placeholder || "";
        input.required = !field.optional;
        wrapper.appendChild(input);
        return wrapper;
    }

    function renderFields(container, section, fields, prefix) {
        container.innerHTML = "";
        const visibleFields = prefix === "query"
            ? fields.filter((field) => !isManagedQueryField(field.name))
            : fields;
        section.hidden = !visibleFields.length;
        visibleFields.forEach((field) => container.appendChild(createInput(field, prefix)));
    }

    function applyEndpoint(index) {
        selectedIndex = index;
        const endpoint = endpointConfigs[index];
        if (!endpoint) {
            return;
        }

        endpointSelect.value = String(index);
        endpointCards.forEach((card, cardIndex) => card.classList.toggle("active", cardIndex === index));

        renderFields(pathFields, pathSection, endpoint.pathFields || [], "path");
        renderFields(queryFields, querySection, endpoint.queryFields || [], "query");
        renderFields(bodyFields, bodySection, endpoint.bodyFields || [], "body");

        endpointHelper.textContent = buildActionHelperText(endpoint);
    }

    function getFieldValues(container) {
        const values = {};
        container.querySelectorAll("input, select").forEach((input) => {
            values[input.name] = input.value.trim();
        });
        return values;
    }

    function convertValue(value, type) {
        if (value === "") {
            return null;
        }
        if (type === "number") {
            return Number(value);
        }
        if (type === "decimal") {
            return Number(value);
        }
        if (type === "boolean") {
            return value === "true";
        }
        if (type === "list") {
            return value.split(",").map((item) => item.trim()).filter(Boolean);
        }
        return value;
    }

    function buildPath(endpoint) {
        let path = endpoint.path.split("?")[0];
        const values = getFieldValues(pathFields);
        (endpoint.pathFields || []).forEach((field) => {
            path = path.replace("{" + field.name + "}", encodeURIComponent(values[field.name] || ""));
        });
        return path;
    }

    function buildQuery(endpoint, pageOverride = 0) {
        const values = getFieldValues(queryFields);
        const params = new URLSearchParams();
        (endpoint.queryFields || []).forEach((field) => {
            if (field.name === "page") {
                params.append("page", String(pageOverride));
                return;
            }
            if (field.name === "size") {
                params.append("size", String(defaultPageSize(endpoint)));
                return;
            }
            if (field.name === "sort") {
                return;
            }
            const value = values[field.name];
            if (value !== "") {
                params.append(field.name, value);
            }
        });
        const query = params.toString();
        return query ? "?" + query : "";
    }

    function buildBody(endpoint) {
        if (!endpoint.bodyFields || !endpoint.bodyFields.length) {
            return "";
        }

        const isPatch = endpoint.method === "PATCH";
        const values = readBodyValues();

        if (strictRequestEntities.has(entityKey)) {
            return buildStrictBody(endpoint, values, isPatch);
        }

        const body = {};
        Object.entries(values).forEach(([name, value]) => {
            if (isEmptyValue(value)) {
                return;
            }
            body[name] = value;
        });

        return Object.keys(body).length ? JSON.stringify(body) : "";
    }

    function readBodyValues() {
        const values = {};
        bodyFields.querySelectorAll("input, select").forEach((input) => {
            values[input.name] = convertValue(input.value.trim(), input.dataset.type);
        });
        return values;
    }

    function isEmptyValue(value) {
        return value === null || value === undefined || value === "" || (Array.isArray(value) && !value.length);
    }

    function includeIfPresent(target, key, value) {
        if (!isEmptyValue(value)) {
            target[key] = value;
        }
    }

    function requireFields(values, fields, labels = {}) {
        const missing = fields.filter((field) => isEmptyValue(values[field]));
        if (!missing.length) {
            return;
        }
        throw new Error("Provide " + missing.map((field) => labels[field] || normalizeLabel(field)).join(", ") + ".");
    }

    function buildCityObject(values, requireAll) {
        if (requireAll) {
            requireFields(values, ["city", "country"]);
        }

        if (isEmptyValue(values.city) && isEmptyValue(values.country)) {
            return null;
        }

        const city = {};
        includeIfPresent(city, "city", values.city);
        if (!isEmptyValue(values.country)) {
            city.country = { country: values.country };
        }
        return Object.keys(city).length ? city : null;
    }

    function buildNestedAddress(values, requireAll) {
        if (requireAll) {
            requireFields(values, ["address", "district", "postalCode", "phone", "city", "country"], {
                postalCode: "Postal Code"
            });
        }

        const address = {};
        includeIfPresent(address, "address", values.address);
        includeIfPresent(address, "address2", values.address2);
        includeIfPresent(address, "district", values.district);
        includeIfPresent(address, "postalCode", values.postalCode);
        includeIfPresent(address, "phone", values.phone);

        const city = buildCityObject(values, requireAll);
        if (city) {
            address.city = city;
        }

        return Object.keys(address).length ? address : null;
    }

    function buildAddressBody(values, isPatch) {
        const body = buildNestedAddress(values, !isPatch);
        return body ? JSON.stringify(body) : "";
    }

    function buildCityBody(values, isPatch) {
        if (!isPatch) {
            requireFields(values, ["city", "country"]);
        }

        const body = {};
        includeIfPresent(body, "city", values.city);
        if (!isEmptyValue(values.country)) {
            body.country = { country: values.country };
        }
        return Object.keys(body).length ? JSON.stringify(body) : "";
    }

    function buildCustomerBody(values, isPatch) {
        if (!isPatch) {
            requireFields(values, ["firstName", "lastName", "storeId", "address", "district", "postalCode", "phone", "city", "country"], {
                storeId: "Store Id",
                postalCode: "Postal Code"
            });
        }

        const body = {};
        includeIfPresent(body, "firstName", values.firstName);
        includeIfPresent(body, "lastName", values.lastName);
        includeIfPresent(body, "email", values.email);
        includeIfPresent(body, "storeId", values.storeId);

        if (isPatch) {
            includeIfPresent(body, "active", values.active);
        } else {
            body.active = isEmptyValue(values.active) ? true : values.active;
        }

        const address = buildNestedAddress(values, !isPatch);
        if (address) {
            body.address = address;
        }

        return Object.keys(body).length ? JSON.stringify(body) : "";
    }

    function buildFilmBody(values, isPatch) {
        if (!isPatch) {
            requireFields(values, ["title", "language", "categories", "actors"]);
        }

        const body = {};
        includeIfPresent(body, "title", values.title);
        includeIfPresent(body, "description", values.description);
        includeIfPresent(body, "releaseYear", values.releaseYear);
        includeIfPresent(body, "language", values.language);
        includeIfPresent(body, "categories", values.categories);
        includeIfPresent(body, "actors", values.actors);
        includeIfPresent(body, "rentalDuration", values.rentalDuration);
        includeIfPresent(body, "rentalRate", values.rentalRate);
        includeIfPresent(body, "length", values.length);
        includeIfPresent(body, "replacementCost", values.replacementCost);
        includeIfPresent(body, "rating", values.rating);
        includeIfPresent(body, "specialFeatures", values.specialFeatures);
        return Object.keys(body).length ? JSON.stringify(body) : "";
    }

    function buildStoreBody(values, isPatch) {
        if (!isPatch) {
            requireFields(values, ["managerStaffId", "address", "district", "postalCode", "phone", "city", "country"], {
                managerStaffId: "Manager Staff Id",
                postalCode: "Postal Code"
            });
        }

        const body = {};
        includeIfPresent(body, "managerStaffId", values.managerStaffId);

        const address = buildNestedAddress(values, !isPatch);
        if (address) {
            body.address = address;
        }

        return Object.keys(body).length ? JSON.stringify(body) : "";
    }

    function buildStrictBody(endpoint, values, isPatch) {
        switch (entityKey) {
            case "addresses":
                return buildAddressBody(values, isPatch);
            case "cities":
                return buildCityBody(values, isPatch);
            case "customers":
                return buildCustomerBody(values, isPatch);
            case "films":
                return buildFilmBody(values, isPatch);
            case "stores":
                return buildStoreBody(values, isPatch);
            default:
                return "";
        }
    }

    function setStatus(text, cssClass) {
        statusBadge.textContent = text;
        statusBadge.className = "status" + (cssClass ? " " + cssClass : "");
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    function formatValue(value) {
        if (value === null || value === undefined || value === "") {
            return "Not available";
        }
        if (Array.isArray(value)) {
            return value.join(", ");
        }
        return String(value);
    }

    function normalizeLabel(value) {
        return String(value)
            .replace(/([a-z])([A-Z])/g, "$1 $2")
            .replace(/^./, (match) => match.toUpperCase());
    }

    function safeParseJson(value) {
        if (typeof value !== "string") {
            return value;
        }
        const trimmed = value.trim();
        if ((!trimmed.startsWith("{") || !trimmed.endsWith("}")) && (!trimmed.startsWith("[") || !trimmed.endsWith("]"))) {
            return value;
        }
        try {
            return JSON.parse(trimmed);
        } catch (error) {
            return value;
        }
    }

    function isObjectLike(value) {
        return value && typeof value === "object" && !Array.isArray(value);
    }

    function hasNestedValue(value) {
        const parsed = safeParseJson(value);
        return Array.isArray(parsed) || isObjectLike(parsed);
    }

    function orderColumns(columns) {
        const priority = [
            "actorId",
            "addressId",
            "categoryId",
            "cityId",
            "countryId",
            "customerId",
            "filmId",
            "inventoryId",
            "languageId",
            "paymentId",
            "rentalId",
            "staffId",
            "storeId",
            "id",
            "country",
            "city",
            "name",
            "title",
            "firstName",
            "lastName"
        ];

        return [...columns].sort((left, right) => {
            const leftPriority = priority.indexOf(left);
            const rightPriority = priority.indexOf(right);

            if (leftPriority !== -1 || rightPriority !== -1) {
                if (leftPriority === -1) {
                    return 1;
                }
                if (rightPriority === -1) {
                    return -1;
                }
                return leftPriority - rightPriority;
            }

            const leftIsId = /id$/i.test(left);
            const rightIsId = /id$/i.test(right);
            if (leftIsId !== rightIsId) {
                return leftIsId ? -1 : 1;
            }

            return left.localeCompare(right);
        });
    }

    function collectColumns(data) {
        const columns = Array.from(data.reduce((set, item) => {
            Object.keys(item || {}).forEach((key) => set.add(key));
            return set;
        }, new Set()));

        return orderColumns(columns);
    }

    function pickCardTitle(row) {
        if (row.title) {
            return formatValue(row.title);
        }
        if (row.name) {
            return formatValue(row.name);
        }
        if (row.firstName || row.lastName) {
            return [row.firstName, row.lastName].filter(Boolean).map((value) => formatValue(value)).join(" ");
        }
        if (row.country) {
            return formatValue(row.country);
        }
        if (row.city) {
            return formatValue(row.city);
        }
        const identifier = Object.entries(row || {}).find(([key, value]) => /id$/i.test(key) && value !== null && value !== undefined && value !== "");
        return identifier ? `${normalizeLabel(identifier[0])} ${formatValue(identifier[1])}` : "Record";
    }

    function pickCardMeta(row) {
        const candidates = [
            "filmId",
            "actorId",
            "countryId",
            "cityId",
            "categoryId",
            "customerId",
            "inventoryId",
            "paymentId",
            "rentalId",
            "staffId",
            "storeId",
            "releaseYear",
            "rating",
            "active"
        ];

        return candidates
            .filter((key) => row[key] !== null && row[key] !== undefined && row[key] !== "" && !hasNestedValue(row[key]))
            .slice(0, 4)
            .map((key) => ({ key, label: normalizeLabel(key), value: formatValue(row[key]) }));
    }

    function renderRecordCards(data, depth = 0) {
        const summaryItems = depth === 0 ? [`Showing ${data.length} record${data.length === 1 ? "" : "s"}`] : [];

        return `
            <div class="response-stack">
                ${renderSummary(summaryItems)}
                <div class="record-grid">
                    ${data.map((row) => {
                        const title = pickCardTitle(row || {});
                        const meta = pickCardMeta(row || {});
                        const metaKeys = new Set(meta.map((item) => item.key));
                        const detailEntries = Object.entries(row || {}).filter(([key]) => {
                            if (row.title && key === "title") {
                                return false;
                            }
                            if (row.name && key === "name") {
                                return false;
                            }
                            if ((row.firstName || row.lastName) && (key === "firstName" || key === "lastName")) {
                                return false;
                            }
                            if (row.country && key === "country") {
                                return false;
                            }
                            if (row.city && key === "city") {
                                return false;
                            }
                            return !metaKeys.has(key);
                        });

                        return `
                            <article class="record-card">
                                <div class="record-header">
                                    <strong class="record-title">${escapeHtml(title)}</strong>
                                    ${meta.length ? `<div class="record-meta">${meta.map((item) => `<span class="response-pill">${escapeHtml(item.label + ": " + item.value)}</span>`).join("")}</div>` : ""}
                                </div>
                                ${detailEntries.length ? `
                                    <div class="detail-grid">
                                        ${detailEntries.map(([key, value]) => `
                                            <div class="detail-card">
                                                <strong>${escapeHtml(normalizeLabel(key))}</strong>
                                                ${renderValue(value, depth + 1)}
                                            </div>
                                        `).join("")}
                                    </div>
                                ` : ""}
                            </article>
                        `;
                    }).join("")}
                </div>
            </div>
        `;
    }

    function extractPagination(data) {
        return {
            page: Number.isFinite(data.number) ? data.number : 0,
            totalPages: Math.max(Number.isFinite(data.totalPages) ? data.totalPages : 1, 1),
            totalElements: Number.isFinite(data.totalElements) ? data.totalElements : data.content.length,
            size: Number.isFinite(data.size) ? data.size : defaultPageSize(endpointConfigs[selectedIndex])
        };
    }

    function renderPaginationControls(pagination) {
        if (!pagination || pagination.totalPages <= 1) {
            return "";
        }

        const showExpandedPagingButton = usesExpandedPaging(endpointConfigs[selectedIndex]);
        const nextPageByHundred = pagination.page + 100;
        const nextSizeByHundred = pagination.size + 100;

        return `
            <div class="pagination-row">
                <button type="button" data-page-target="${pagination.page - 1}" ${pagination.page <= 0 ? "disabled" : ""}>Previous page</button>
                <span class="response-pill">Page ${pagination.page + 1} of ${pagination.totalPages}</span>
                <span class="response-pill">Total items ${pagination.totalElements}</span>
                <button type="button" data-page-target="${pagination.page + 1}" ${pagination.page + 1 >= pagination.totalPages ? "disabled" : ""}>Next page</button>
                ${showExpandedPagingButton ? `<button type="button" data-page-target="${nextPageByHundred}" data-size-target="${nextSizeByHundred}">Next +100</button>` : ""}
            </div>
        `;
    }

    function updatePageInPath(path, nextPage, nextSize) {
        const [basePath, queryString = ""] = path.split("?");
        const params = new URLSearchParams(queryString);
        const resolvedSize = nextSize ?? responsePagination?.size ?? defaultPageSize(endpointConfigs[selectedIndex]);
        params.set("page", String(Math.max(nextPage, 0)));
        params.set("size", String(resolvedSize));
        return `${basePath}?${params.toString()}`;
    }

    function getFriendlyError(parsed) {
        if (!parsed || typeof parsed !== "object") {
            return null;
        }

        if (parsed.errors && typeof parsed.errors === "object" && !Array.isArray(parsed.errors)) {
            const fieldErrors = Object.entries(parsed.errors)
                .map(([field, message]) => `${normalizeLabel(field)}: ${Array.isArray(message) ? message.join(", ") : message}`)
                .join(" ");
            return [parsed.message, fieldErrors].filter(Boolean).join(" ");
        }

        if (Array.isArray(parsed.errors) && parsed.errors.length) {
            return parsed.errors
                .map((item) => {
                    if (typeof item === "string") {
                        return item;
                    }
                    if (item && typeof item === "object") {
                        return item.defaultMessage || item.message || item.code || "One of the submitted values is invalid.";
                    }
                    return String(item);
                })
                .join(" ");
        }

        return parsed.detail
            || parsed.error
            || parsed.title
            || parsed.message
            || null;
    }

    function getBackendGuidance(message) {
        if (!message || !message.includes("Could not initialize proxy")) {
            return null;
        }

        return "Backend issue: the Address list endpoint is returning a lazy Hibernate proxy for Country after the session closed. Fix `/api/addresses` by mapping to DTOs inside the transaction or by fetch-joining `address.city.country` before serialization.";
    }

    function isPagedResult(value) {
        return value && typeof value === "object" && !Array.isArray(value) && Array.isArray(value.content);
    }

    function unwrapDataEnvelope(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
            return value;
        }

        if (isPagedResult(value)) {
            return value;
        }
        if (Array.isArray(value.data)) {
            return value.data;
        }
        if (value.data && typeof value.data === "object") {
            return value.data;
        }
        if (Array.isArray(value.items)) {
            return value.items;
        }
        if (Array.isArray(value.results)) {
            return value.results;
        }
        if (Array.isArray(value.records)) {
            return value.records;
        }
        return value;
    }

    function renderSummary(items) {
        if (!items.length) {
            return "";
        }
        return `
            <div class="response-summary">
                ${items.map((item) => `<span class="response-pill">${escapeHtml(item)}</span>`).join("")}
            </div>
        `;
    }

    function summarizeObjectForTable(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
            return value;
        }

        if (value.title !== undefined && value.title !== null && value.title !== "") {
            return value.title;
        }
        if (value.name !== undefined && value.name !== null && value.name !== "") {
            return value.name;
        }
        if (value.country !== undefined && value.country !== null && value.country !== "") {
            return value.country;
        }
        if (value.city !== undefined && value.city !== null && value.city !== "") {
            return value.city;
        }
        if ((value.firstName || value.lastName) && (value.firstName !== undefined || value.lastName !== undefined)) {
            return [value.firstName, value.lastName].filter(Boolean).join(" ");
        }

        const identifier = Object.entries(value).find(([key, nestedValue]) =>
            /id$/i.test(key) && nestedValue !== null && nestedValue !== undefined && nestedValue !== ""
        );
        if (identifier) {
            return identifier[1];
        }

        return JSON.stringify(value);
    }

    function summarizeArrayForTable(value) {
        if (!Array.isArray(value)) {
            return value;
        }
        if (!value.length) {
            return "None";
        }

        const summary = value
            .slice(0, 4)
            .map((item) => summarizeTableValue(item))
            .map((item) => formatValue(item))
            .join(", ");

        return value.length > 4 ? `${summary}, +${value.length - 4} more` : summary;
    }

    function summarizeTableValue(value) {
        const parsed = safeParseJson(value);
        if (Array.isArray(parsed)) {
            return summarizeArrayForTable(parsed);
        }
        if (parsed && typeof parsed === "object") {
            return summarizeObjectForTable(parsed);
        }
        return parsed;
    }

    function normalizeTableRow(row, columns) {
        return columns.reduce((normalized, column) => {
            normalized[column] = summarizeTableValue(row ? row[column] : null);
            return normalized;
        }, {});
    }

    function renderObjectTable(data, depth = 0) {
        const columns = orderColumns(Object.keys(data || {}));
        if (!columns.length) {
            return '<div class="response-empty">Nothing to show.</div>';
        }

        return `
            <div class="response-stack">
                ${renderSummary(["Showing 1 item"])}
                <div class="detail-grid">
                    ${columns.map((column) => `
                        <div class="detail-card">
                            <strong>${escapeHtml(normalizeLabel(column))}</strong>
                            ${renderValue(data[column], depth + 1)}
                        </div>
                    `).join("")}
                </div>
            </div>
        `;
    }

    function renderScalar(value) {
        return `<div class="message-card"><p>${escapeHtml(formatValue(value))}</p></div>`;
    }

    function renderValue(value, depth = 0) {
        const parsed = safeParseJson(value);

        if (parsed === null || parsed === undefined || parsed === "") {
            return `<span>${escapeHtml(formatValue(parsed))}</span>`;
        }

        if (Array.isArray(parsed)) {
            if (!parsed.length) {
                return `<span>No values</span>`;
            }

            if (depth >= 1) {
                if (parsed.some((item) => typeof item === "object" && item !== null)) {
                    return `
                        <div class="nested-list">
                            ${parsed.map((item, index) => `
                                <div class="nested-item">
                                    <strong>Item ${index + 1}</strong>
                                    ${renderValue(item, depth + 1)}
                                </div>
                            `).join("")}
                        </div>
                    `;
                }
                return `
                    <div class="chip-list">
                        ${parsed.map((item) => `<span class="chip">${escapeHtml(formatValue(item))}</span>`).join("")}
                    </div>
                `;
            }

            return renderArray(parsed, depth + 1);
        }

        if (typeof parsed === "object") {
            if (depth >= 1) {
                return `
                    <div class="nested-list">
                        ${Object.entries(parsed).map(([key, nestedValue]) => `
                            <div class="nested-item">
                                <strong>${escapeHtml(normalizeLabel(key))}</strong>
                                ${renderValue(nestedValue, depth + 1)}
                            </div>
                        `).join("")}
                    </div>
                `;
            }
            return renderObject(parsed, depth + 1);
        }

        return `<span>${escapeHtml(formatValue(parsed))}</span>`;
    }

    function renderObject(data, depth = 0) {
        const normalizedData = unwrapDataEnvelope(data);
        if (normalizedData !== data) {
            return renderValue(normalizedData, depth);
        }

        if (isPagedResult(data)) {
            const pagination = extractPagination(data);
            responsePagination = pagination;
            return `
                <div class="response-stack">
                    ${renderPaginationControls(pagination)}
                    ${renderArray(data.content || [], depth + 1)}
                    ${renderPaginationControls(pagination)}
                </div>
            `;
        }

        const entries = Object.entries(data || {});
        if (!entries.length) {
            return '<div class="response-empty">Nothing to show.</div>';
        }

        return renderObjectTable(data, depth);
    }

    function renderArray(data, depth = 0) {
        if (!data.length) {
            return '<div class="response-empty">No matching items found.</div>';
        }

        if (typeof data[0] !== "object" || data[0] === null || Array.isArray(data[0])) {
            return `
                <div class="chip-list">
                    ${data.map((item) => `
                        <span class="chip">${escapeHtml(formatValue(item))}</span>
                    `).join("")}
                </div>
            `;
        }

        const columns = collectColumns(data);
        const normalizedRows = data.map((row) => normalizeTableRow(row, columns));
        return `
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>${columns.map((column) => `<th>${escapeHtml(normalizeLabel(column))}</th>`).join("")}</tr>
                    </thead>
                    <tbody>
                        ${normalizedRows.map((row) => `
                            <tr>
                                ${columns.map((column) => `<td>${renderValue(row[column], depth + 1)}</td>`).join("")}
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderFriendlyError(message, details, guidance = null) {
        responseOutput.innerHTML = `
            <div class="table-wrap">
                <div class="message-card">
                    <strong>${escapeHtml(message)}</strong>
                    <p>${escapeHtml(details)}</p>
                    ${guidance ? `<p style="margin-top: 10px;">${escapeHtml(guidance)}</p>` : ""}
                </div>
            </div>
        `;
    }

    function renderResponseBody(body, status) {
        responsePagination = null;
        if (!body) {
            responseOutput.innerHTML = '<div class="response-empty">Done.</div>';
            return;
        }

        try {
            const parsed = unwrapDataEnvelope(JSON.parse(body));
            const friendlyError = getFriendlyError(parsed);
            if (status >= 400 && friendlyError) {
                renderFriendlyError(
                    "We could not complete this action.",
                    friendlyError,
                    getBackendGuidance(friendlyError)
                );
                return;
            }

            if (Array.isArray(parsed)) {
                responseOutput.innerHTML = renderArray(parsed);
                return;
            }
            if (typeof parsed === "object" && parsed !== null) {
                responseOutput.innerHTML = renderObject(parsed);
                return;
            }
            responseOutput.innerHTML = renderScalar(parsed);
        } catch (error) {
            responseOutput.innerHTML = `
                <div class="message-card">
                    <strong>Result received</strong>
                    <p>${escapeHtml(body)}</p>
                </div>
            `;
        }
    }

    async function executePayload(payload) {
        lastRequestPayload = payload;
        setStatus("Working", "");
        responsePagination = null;
        responseOutput.innerHTML = '<div class="response-empty">Working on it...</div>';

        try {
            const response = await fetch("/ui/api-explorer/execute", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (result.error) {
                setStatus("Check details", "error");
                renderFriendlyError(
                    "We could not send this action.",
                    result.error || "Please check the details you entered and try again."
                );
                return;
            }

            setStatus(result.status >= 200 && result.status < 300 ? "Done" : "Check details", result.status >= 200 && result.status < 300 ? "ok" : "error");
            renderResponseBody(result.body, result.status);
        } catch (error) {
            setStatus("Unavailable", "error");
            renderFriendlyError(
                "We could not connect right now.",
                error.message || "The service may be temporarily unavailable."
            );
        }
    }

    endpointConfigs.forEach((endpoint, index) => {
        const option = new Option(buildFriendlyActionTitle(endpoint), String(index));
        endpointSelect.add(option);
    });

    endpointCards.forEach((card, index) => {
        const endpoint = endpointConfigs[index];
        const title = card.querySelector(".endpoint-title");
        const subtitle = card.querySelector(".endpoint-subtitle");

        if (endpoint && title) {
            title.textContent = buildFriendlyActionTitle(endpoint);
        }
        if (endpoint && subtitle) {
            subtitle.textContent = endpoint.method + " " + endpoint.path;
        }
    });

    endpointCards.forEach((card, index) => {
        card.addEventListener("click", () => applyEndpoint(index));
    });

    endpointSelect.addEventListener("change", (event) => {
        applyEndpoint(Number(event.target.value));
    });

    document.getElementById("resetButton").addEventListener("click", () => applyEndpoint(selectedIndex));

    responseOutput.addEventListener("click", (event) => {
        const trigger = event.target.closest("[data-page-target]");
        if (!trigger || trigger.disabled || !lastRequestPayload) {
            return;
        }

        const nextPage = Number(trigger.dataset.pageTarget);
        const nextSize = trigger.dataset.sizeTarget ? Number(trigger.dataset.sizeTarget) : undefined;
        executePayload({
            ...lastRequestPayload,
            path: updatePageInPath(lastRequestPayload.path, nextPage, nextSize)
        });
    });

    document.getElementById("sendButton").addEventListener("click", async () => {
        const endpoint = endpointConfigs[selectedIndex];
        try {
            const payload = {
                method: endpoint.method,
                path: buildPath(endpoint) + buildQuery(endpoint),
                body: buildBody(endpoint)
            };
            if (shouldOpenResultsInNewTab(endpoint)) {
                const params = new URLSearchParams({
                    title: buildFriendlyActionTitle(endpoint),
                    method: payload.method,
                    path: payload.path
                });
                window.open("/results?" + params.toString(), "_blank", "noopener");
                return;
            }
            executePayload(payload);
        } catch (error) {
            setStatus("Check details", "error");
            renderFriendlyError("Some information is missing.", error.message || "Please fill in the required fields and try again.");
        }
    });

    applyEndpoint(0);
</script>
</body>
</html>
