<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Utsav Sarda - Profile</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 800px; margin: 0 auto; padding: 30px; background-color: #f4f7f6;}
    .profile-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    .entity-section { margin-top: 20px; padding: 15px; background: #fdfdfd; border-left: 4px solid #3498db; border-radius: 4px; }
    .btn-container { margin-top: 15px; }
    .btn { padding: 10px 15px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;}
    .btn:hover { background: #2980b9; }
    .back-link { display: inline-block; margin-top: 30px; text-decoration: none; color: #7f8c8d; }
    .back-link:hover { color: #34495e; text-decoration: underline; }
  </style>
</head>
<body>

<div class="profile-container">
  <h1>Utsav Sarda</h1>
  <p><strong>Responsibilities:</strong> Staff ,Payment & Rental Entities</p>

  <div class="entity-section">
    <h2>Staff Management</h2>
    <p>Manage Staff.</p>
    <div class="btn-container">
      <a th:href="@{/staff}" class="btn">Manage Staff &rarr;</a>
    </div>
  </div>
  <div class="entity-section">
    <h2>Payment Management</h2>
    <p>Payments.</p>
    <div class="btn-container">
      <a th:href="@{/payments}" class="btn">Payments &rarr;</a>
    </div>
  </div>
  <div class="entity-section">
    <h2>Rentals</h2>
    <p>Manage Rentals.</p>
    <div class="btn-container">
      <a th:href="@{/rentals}" class="btn">Manage Rentals &rarr;</a>
    </div>
  </div>
  <div class="btn-container">
  <a th:href="@{/}" class="back-link">&larr; Back to Team Roster</a>
  </div>
</div>

</body>
</html>
