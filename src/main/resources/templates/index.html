<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Rental Store</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0f1115;
            color: #f3f4f6;
        }

        .shell {
            max-width: 900px;
            margin: 0 auto;
            padding: 36px 20px 48px;
        }

        h1 {
            margin: 0 0 28px;
            text-align: center;
            font-size: 2.1rem;
            font-weight: 600;
        }

        .team-list {
            display: grid;
            gap: 16px;
        }

        .member-card {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px;
            border: 1px solid #22262e;
            border-radius: 14px;
            background: #171a21;
            text-decoration: none;
            color: inherit;
        }

        .member-card:hover {
            border-color: #2c313b;
        }

        .member-photo {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid #22262e;
            background: #20252d;
        }

        .member-info h2 {
            margin: 0 0 6px;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .member-role {
            margin: 0;
            color: #a3aab7;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<main class="shell">
    <h1>Film Rental Store</h1>

    <section class="team-list">
        <a class="member-card" th:each="member : ${members}" th:href="@{/member/{name}(name=${member.key})}">
            <img class="member-photo" th:src="${member.imagePath}" th:alt="${member.name}">
            <div class="member-info">
                <h2 th:text="${member.name}">Member Name</h2>
                <p class="member-role" th:text="${member.role}">Role</p>
            </div>
        </a>
    </section>
</main>
</body>
</html>
